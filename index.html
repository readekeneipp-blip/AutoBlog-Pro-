<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBlog Pro</title>
    <style>
        body { background-color: #020617; color: #ffffff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; margin-top: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        h1 { color: #3b82f6; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 12px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #2563eb; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #1e3a8a; opacity: 0.7; }
        #result { margin-top: 20px; color: #cbd5e1; font-size: 14px; line-height: 1.6; white-space: pre-wrap; width: 100%; }
        .loading { color: #60a5fa; display: none; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>AutoBlog Pro</h1>
    <p>AI Blog Automation is Live</p>

    <div class="card">
        <input id="topic" type="text" placeholder="Enter topic (e.g. Fishing Tips)">
        <button onclick="generate()" id="btn">Generate AI Post</button>
        <div id="loading" class="loading">Generating... please wait...</div>
        <div id="result"></div>
    </div>

    <script>
        async function generate() {
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('btn');
            const resDiv = document.getElementById('result');
            const loadDiv = document.getElementById('loading');

            if(!topic) return alert('Please enter a topic!');

            btn.disabled = true;
            loadDiv.style.display = 'block';
            resDiv.innerHTML = '';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic })
                });
                const data = await response.json();
                resDiv.innerHTML = data.content;
            } catch (e) {
                alert('Error: Check Render logs');
            } finally {
                btn.disabled = false;
                loadDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
